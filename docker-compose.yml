version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: orgo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-orgo_veggies}
      MYSQL_USER: ${MYSQL_USER:-orgo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-orgo_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orgo-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DJANGO_PORT: ${DJANGO_PORT:-8000}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_DB_ENGINE: django.db.backends.mysql
      DJANGO_DB_NAME: ${MYSQL_DATABASE:-orgo_veggies}
      DJANGO_DB_USER: ${MYSQL_USER:-orgo_user}
      DJANGO_DB_PASSWORD: ${MYSQL_PASSWORD:-orgo_password}
      DJANGO_DB_HOST: mysql
      DJANGO_DB_PORT: "3306"
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8080}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orgo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-80}
      NGINX_BACKEND_HOST: backend
      NGINX_BACKEND_PORT: "8000"
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql_data: