<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | Orgo Veggies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div data-component="header"></div>
    <main class="container py-4">
        <h1 class="page-title mb-4">Seller Dashboard</h1>
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="seller-metric">
                    <h6>Products Listed</h6>
                    <p class="display-6 mb-0">32</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="seller-metric">
                    <h6>Today Orders</h6>
                    <p class="display-6 mb-0">9</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="seller-metric">
                    <h6>Revenue</h6>
                    <p class="display-6 mb-0">$480</p>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <h2 class="h5">Quick Product Upload</h2>
                <form class="row g-2">
                    <div class="col-md-4"><input class="form-control" placeholder="Product name"></div>
                    <div class="col-md-3"><input class="form-control" placeholder="Price" type="number" step="0.01">
                    </div>
                    <div class="col-md-3"><input class="form-control" placeholder="Stock" type="number"></div>
                    <div class="col-md-2"><button class="btn btn-success w-100" type="button">Save</button></div>
                </form>
            </div>
        </div>
    </main>
    <div data-component="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
