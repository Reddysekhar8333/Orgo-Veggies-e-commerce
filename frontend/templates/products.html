<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Orgo Veggies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div data-component="header"></div>
    <main class="container py-4">
        <h1 class="page-title mb-3">Products</h1>
        <form id="product-filters" class="row g-2 mb-4">
            <div class="col-md-4"><input class="form-control" name="q" placeholder="Search product"></div>
            <div class="col-md-2"><input class="form-control" name="min_price" type="number" step="0.01"
                    placeholder="Min"></div>
            <div class="col-md-2"><input class="form-control" name="max_price" type="number" step="0.01"
                    placeholder="Max"></div>
            <div class="col-md-2 form-check d-flex align-items-center"><input class="form-check-input me-2"
                    id="stockOnly" name="in_stock" type="checkbox"><label class="form-check-label" for="stockOnly">In
                    stock only</label></div>
            <div class="col-md-2"><button class="btn btn-success w-100" type="submit">Filter</button></div>
        </form>
        <div id="product-grid" class="row g-3"></div>
    </main>
    <div data-component="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
