<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Orgo Veggies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div data-component="header"></div>
    <main class="container py-5">
        <div class="card auth-card">
            <div class="card-body">
                <h1 class="h4 mb-3">Register</h1>
                <form id="register-form" class="vstack gap-3"><input name="username" class="form-control"
                        placeholder="Username" required><input name="email" type="email" class="form-control"
                        placeholder="Email" required><input name="password" type="password" class="form-control"
                        placeholder="Password" required><select name="role" class="form-select" required>
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                    </select><button class="btn btn-success">Create account</button></form>
            </div>
        </div>
    </main>
    <div data-component="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
