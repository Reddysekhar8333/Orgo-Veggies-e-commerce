<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Orgo Veggies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div data-component="header"></div>
    <main class="container py-4">
        <h1 class="page-title">Your Cart</h1>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cart-table"></tbody>
            </table>
        </div>
        <h5 class="text-end">Total: $<span id="cart-total">0.00</span></h5>
        <div class="text-end"><a class="btn btn-success" href="/templates/checkout.html">Proceed to checkout</a></div>
    </main>
    <div data-component="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
