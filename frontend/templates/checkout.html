<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Orgo Veggies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div data-component="header"></div>
    <main class="container py-4">
        <div class="card checkout-card">
            <div class="card-body">
                <h1 class="h3 mb-3">Checkout</h1>
                <form id="checkout-form">
                    <div class="mb-3"><label class="form-label">Delivery Address</label><textarea class="form-control"
                            required></textarea></div>
                    <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" required></div>
                    <button class="btn btn-success w-100">Place Order</button>
                </form>
            </div>
        </div>
    </main>
    <div data-component="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
